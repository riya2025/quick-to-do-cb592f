services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: appadmin
      POSTGRES_PASSWORD: app_secret
      POSTGRES_DB: quick_to_do_db
    volumes:
      - dbdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appadmin -d quick_to_do_db"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: ./backend
    image: quick-to-do-backend
    environment:
      DATABASE_URL: postgresql://appadmin:app_secret@db:5432/quick_to_do_db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    image: quick-to-do-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    restart: unless-stopped
volumes:
  dbdata:
