# Generated by AI Foundry Deployment Agent (OPTIONAL — manual only).
# The AI Foundry control plane already deploys Vercel + Render via their APIs,
# so this workflow is not required. Run it manually from the Actions tab after
# adding the repo secrets below. Steps self-skip when a secret is missing.
name: Deploy (Vercel + Render)

on:
  workflow_dispatch:

jobs:
  frontend-vercel:
    name: Deploy frontend to Vercel
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Vercel CLI
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: npm install -g vercel
      - name: Deploy to Vercel (production)
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"
      - name: Skipped (no VERCEL_TOKEN secret)
        if: ${{ env.VERCEL_TOKEN == '' }}
        run: echo "VERCEL_TOKEN secret not set — skipping Vercel deploy."

  backend-render:
    name: Deploy backend to Render
    runs-on: ubuntu-latest
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
    steps:
      - name: Trigger Render deploy
        if: ${{ env.RENDER_DEPLOY_HOOK_URL != '' }}
        run: curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL"
      - name: Skipped (no RENDER_DEPLOY_HOOK_URL secret)
        if: ${{ env.RENDER_DEPLOY_HOOK_URL == '' }}
        run: echo "RENDER_DEPLOY_HOOK_URL secret not set — skipping Render deploy."
